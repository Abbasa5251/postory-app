# POSTORY — fully local stack, no third-party services and no proxies.
# The app talks directly to a plain Postgres and a plain Redis over their
# standard wire protocols (pg + ioredis):
#   Neon Postgres  → postgres:18   (node-postgres, direct TCP)
#   Upstash Redis  → redis:7        (ioredis, direct TCP)
#
# Bring it up:   docker compose up --build
# Reset data:    docker compose down -v
#
# All values default to zero-config local dev; override any of them from a
# sibling `.env` file or the shell. None of these are real secrets.

name: postory

services:
  # ---- Postgres (replaces Neon) ----
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postory}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18+ stores data in a major-version subdirectory; the mount
      # must be at /var/lib/postgresql (not /data) per the official image.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postory}"]
      interval: 3s
      timeout: 5s
      retries: 20

  # ---- Redis (replaces Upstash) ----
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20

  # ---- One-shot migration job: drizzle-kit connects directly to Postgres. ----
  migrator:
    build:
      context: .
      target: migrator
    environment:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postory}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---- The Next.js app (standalone runtime) ----
  app:
    build:
      context: .
      target: runner
    environment:
      NODE_ENV: production
      # Direct connections — no proxies.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postory}
      REDIS_URL: redis://redis:6379
      # better-auth. Dev secret — override for anything shared.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev_local_secret_change_me_0123456789abcd}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Email: Resend has no local emulator (HTTP API). A dummy key + a
      # non-sandbox EMAIL_FROM satisfy the prod boot guards; actual sends
      # will no-op/fail locally, which is expected for a fully-local stack.
      RESEND_API_KEY: ${RESEND_API_KEY:-re_local_dev_dummy}
      EMAIL_FROM: ${EMAIL_FROM:-Postory <no-reply@postory.local>}
      # Optional integrations — unset locally (services throw lazily on use).
      ZERNIO_API_KEY: ${ZERNIO_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
